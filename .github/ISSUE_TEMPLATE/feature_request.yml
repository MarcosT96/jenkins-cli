name: Feature request
description: Suggest a command, flag, or MCP tool for jenkins-cli.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the use case, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed command or behavior
      placeholder: "e.g. `jenkins job list <filter>` to filter job names client-side."
    validations:
      required: true
  - type: input
    id: endpoint
    attributes:
      label: Relevant Jenkins REST endpoint (if known)
      description: Helps confirm the feature is possible against the Jenkins API (e.g. `/job/{job}/api/json`).
  - type: textarea
    id: notes
    attributes:
      label: Anything else?
